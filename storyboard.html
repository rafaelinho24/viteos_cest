<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viteos · Storyboard « Aujourd'hui »</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --accent:  #EB6A00;
      --accent2: #70856C;
      --accent-dim: rgba(235, 106, 0, 0.15);
      --bg: #000;
      --text: #fff;
      --text-dim: rgba(255,255,255,0.4);
      --header-h: 52px;
      --strip-h: 108px;
      --font: 'Space Grotesk', -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── HEADER ───────────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      z-index: 200;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
    }

    .brand-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 24px rgba(235,106,0,0.4);
    }

    .brand-name {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .brand-sep { color: var(--text-dim); font-weight: 300; }

    .brand-sub {
      font-size: 12px; font-weight: 300;
      color: var(--text-dim); letter-spacing: 0.06em;
    }

    .nav-group {
      display: flex; align-items: center; gap: 12px;
    }

    .counter {
      font-size: 12px; color: var(--text-dim);
      letter-spacing: 0.06em; font-variant-numeric: tabular-nums;
      min-width: 44px; text-align: right;
    }

    .counter em { color: var(--text); font-style: normal; font-weight: 600; }

    .btn-nav {
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: var(--text);
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s, background .2s;
      outline: none;
    }

    .btn-nav:hover:not(:disabled) {
      border-color: var(--accent); color: var(--accent);
      background: rgba(235,106,0,0.05);
    }

    .btn-nav:disabled { opacity: 0.18; cursor: default; }

    /* ── STAGE ────────────────────────────────────────── */
    .stage {
      position: fixed;
      top: var(--header-h); left: 0; right: 0;
      bottom: var(--strip-h);
      overflow: hidden;
    }

    /* ── SLIDES ───────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 56px 520px 40px 80px;
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
    }

    .slide.is-active { opacity: 1; pointer-events: all; }

    /* Per-slide backgrounds v4 — noir pur (1,2,7,8,10) / image défocalisée (3,4,5,6,9) */
    .slide[data-id="1"]  { background: #000; }
    .slide[data-id="2"]  { background: #000; }
    .slide[data-id="3"]  { background: radial-gradient(ellipse 110% 80% at 55% 50%, #0d1108 0%, #070a05 40%, #020302 75%, #000 100%); }
    .slide[data-id="4"]  { background: radial-gradient(ellipse 110% 80% at 40% 55%, #0e1208 0%, #080b04 40%, #030402 75%, #000 100%); }
    .slide[data-id="5"]  { background: radial-gradient(ellipse 110% 80% at 60% 45%, #150803 0%, #0c0502 40%, #040201 75%, #000 100%); }
    .slide[data-id="6"]  { background: radial-gradient(ellipse 110% 80% at 50% 50%, #12080e 0%, #0a0508 40%, #030202 75%, #000 100%); }
    .slide[data-id="7"]  { background: #000; }
    .slide[data-id="8"]  { background: #000; }
    .slide[data-id="9"]  { background: radial-gradient(ellipse 120% 90% at 50% 50%, #0c1a0c 0%, #071007 35%, #030703 65%, #000 100%); }
    .slide[data-id="10"] { background: #000; }

    /* Decorative glow top-right */
    .slide::after {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      top: -140px; right: 6%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(235,106,0,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── SLIDE CONTENT ────────────────────────────────── */
    .s-tc {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent2); margin-bottom: 10px;
    }

    .s-beat {
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 36px;
    }

    .s-main { }

    .s-tagline {
      font-size: clamp(30px, 4.2vw, 62px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.025em;
      max-width: 820px;
      margin-bottom: 20px;
    }

    .s-tagline .hi { color: var(--accent); }

    .s-subline {
      font-size: 13px; font-weight: 300;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 52px;
    }

    .s-stats {
      display: flex; flex-wrap: wrap; gap: 40px 56px;
      margin-bottom: 16px;
    }

    .stat { display: flex; flex-direction: column; gap: 5px; }

    .stat-val {
      font-size: clamp(22px, 2.8vw, 40px);
      font-weight: 700; color: var(--accent);
      line-height: 1; letter-spacing: -0.01em;
    }

    .stat-lbl {
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent2);
    }

    .s-intro {
      font-size: 12px; font-weight: 300;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent2); margin-bottom: 32px;
    }

    .s-footer {
      margin-top: 32px;
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
    }

    .s-headline {
      font-size: clamp(22px, 2.8vw, 38px);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.015em;
      color: var(--text);
      margin-bottom: 28px;
    }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 20px; }

    .tl-item { display: flex; align-items: center; gap: 18px; }

    .tl-year {
      font-size: 12px; font-weight: 600;
      color: var(--accent); letter-spacing: 0.1em;
      width: 46px; flex-shrink: 0;
    }

    .tl-dash {
      width: 32px; height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, rgba(112,133,108,0.3) 100%);
      flex-shrink: 0;
    }

    .tl-label { font-size: 20px; font-weight: 500; }

    /* Projects */
    .projects { display: flex; flex-direction: column; gap: 14px; }

    .proj-item {
      display: flex; align-items: center; gap: 14px;
      font-size: 22px; font-weight: 500;
    }

    .proj-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    /* Quote */
    .s-quote {
      font-size: clamp(20px, 2.6vw, 36px);
      font-weight: 300;
      line-height: 1.4;
      letter-spacing: 0.01em;
      max-width: 700px;
      color: rgba(255,255,255,0.88);
      margin-bottom: 40px;
    }

    .s-quote::before { content: '«\00a0'; color: var(--accent); }
    .s-quote::after  { content: '\00a0»'; color: var(--accent); }

    .s-logo {
      font-size: 28px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent);
    }

    .s-note {
      position: absolute; bottom: 28px; left: 80px;
      font-size: 11px; color: rgba(255,255,255,0.2);
      font-weight: 300; font-style: italic;
      letter-spacing: 0.04em;
      max-width: 560px;
    }

    /* ── LIGHT THREAD (SVG) ───────────────────────────── */
    .light-thread {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden;
    }

    .light-thread svg { width: 100%; height: 100%; }

    .lp {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      opacity: 0.25;
      filter: drop-shadow(0 0 5px var(--accent)) drop-shadow(0 0 14px rgba(235,106,0,0.35));
      stroke-linecap: round;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
    }

    /* ── FILMSTRIP ────────────────────────────────────── */
    .filmstrip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--strip-h);
      background: #060606;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 28px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      z-index: 200;
    }

    .filmstrip::-webkit-scrollbar { display: none; }

    .thumb {
      flex: 0 0 auto;
      width: 116px; height: 68px;
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1.5px solid transparent;
      transition: border-color .25s, transform .2s, box-shadow .25s;
    }

    .thumb:hover { transform: translateY(-3px); }

    .thumb.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(235,106,0,0.25), 0 4px 20px rgba(235,106,0,0.18);
    }

    .thumb-bg { position: absolute; inset: 0; }

    .thumb-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 55%, transparent 100%);
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 7px 9px;
    }

    .thumb-num {
      position: absolute; top: 5px; left: 7px;
      font-size: 9px; font-weight: 700;
      color: var(--accent); opacity: 0.85;
      letter-spacing: 0.06em;
    }

    .thumb-beat {
      font-size: 8.5px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #fff; line-height: 1.3;
    }

    .thumb-tc {
      font-size: 8px; font-weight: 300;
      color: rgba(255,255,255,0.45);
    }

    /* Thumb gradients — logique v4 */
    .thumb[data-id="1"]  .thumb-bg { background: #000; }
    .thumb[data-id="2"]  .thumb-bg { background: #000; }
    .thumb[data-id="3"]  .thumb-bg { background: radial-gradient(ellipse at 55% 50%, #0d1108 0%, #040604 60%, #000 100%); }
    .thumb[data-id="4"]  .thumb-bg { background: radial-gradient(ellipse at 40% 55%, #0e1209 0%, #050804 60%, #000 100%); }
    .thumb[data-id="5"]  .thumb-bg { background: radial-gradient(ellipse at 60% 45%, #160904 0%, #0a0503 60%, #000 100%); }
    .thumb[data-id="6"]  .thumb-bg { background: radial-gradient(ellipse at 50% 50%, #150810 0%, #0a0508 60%, #000 100%); }
    .thumb[data-id="7"]  .thumb-bg { background: #000; }
    .thumb[data-id="8"]  .thumb-bg { background: #000; }
    .thumb[data-id="9"]  .thumb-bg { background: radial-gradient(ellipse at 50% 50%, #0d1c0d 0%, #070f07 60%, #000 100%); }
    .thumb[data-id="10"] .thumb-bg { background: #000; }

    /* ── PROGRESS BAR ─────────────────────────────────── */
    .progress-bar {
      position: fixed;
      top: var(--header-h); left: 0;
      height: 2px; background: var(--accent);
      opacity: 0.7;
      z-index: 300;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── VIDEO BG PLACEHOLDER ────────────────────────── */
    .video-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(135deg,
        #000 0%, #0d160c 20%, #70856C 50%, #0d160c 80%, #000 100%
      );
      background-size: 300% 300%;
      animation: grad-drift 14s ease-in-out infinite;
      opacity: 0.22;
    }
    @keyframes grad-drift {
      0%   { background-position: 0% 0%; }
      25%  { background-position: 100% 20%; }
      50%  { background-position: 70% 100%; }
      75%  { background-position: 10% 70%; }
      100% { background-position: 0% 0%; }
    }
    .video-hint {
      position: absolute; bottom: 68px; left: 80px;
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(112, 133, 108, 0.45);
      pointer-events: none; z-index: 5;
    }
    .video-hint::before {
      content: '';
      display: inline-block; width: 4px; height: 4px;
      border-radius: 50%; background: #70856C; opacity: 0.5;
      flex-shrink: 0;
    }

    /* ── TYPEWRITER CURSOR ───────────────────────────── */
    .tw-cursor {
      display: inline-block;
      color: var(--accent);
      font-weight: 300;
      margin-left: 1px;
      opacity: 1;
    }
    .tw-blink { animation: tw-blink 0.55s step-end infinite; }
    @keyframes tw-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── KEYBOARD HINT ───────────────────────────────── */
    .key-hint {
      position: fixed;
      bottom: calc(var(--strip-h) + 12px); right: 20px;
      font-size: 10px; color: rgba(255,255,255,0.15);
      letter-spacing: 0.08em;
      z-index: 150;
      pointer-events: none;
    }

    /* ── SLIDE INFO PANEL ─────────────────────────────── */
    .slide-info {
      position: absolute;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 350px;
      opacity: 0.2;
      transition: opacity 0.35s ease;
      cursor: default;
      border-left: 1px solid rgba(255,255,255,0.14);
      padding-left: 18px;
      z-index: 10;
    }

    .slide-info:hover { opacity: 1; }

    .info-block { margin-bottom: 18px; }
    .info-block:last-child { margin-bottom: 0; }

    .info-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 7px;
    }

    .info-text {
      font-size: 14px; font-weight: 300;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
    }
  </style>
</head>

/* ────────────────────────────────────────────────────────
   BUILD SLIDES
──────────────────────────────────────────────────────── */
function buildSlideHTML(s) {
  let main = '';

  if (s.type === 'intro') {
    main = `
      <div class="s-tagline">
        ${s.tagline.map((l, i) => i === 1
          ? `<span class="hi">${l}</span>`
          : l
        ).join('<br>')}
      </div>`;
  }

  else if (s.type === 'hero') {
    main = `
      <p class="s-intro">${s.intro}</p>
      <div class="s-stats">
        <div class="stat">
          <div class="stat-val">${s.heroVal}</div>
          <div class="stat-lbl">${s.heroLabel}</div>
        </div>
      </div>
      ${s.subline ? `<p class="s-subline">${s.subline}</p>` : ''}`;
  }

  else if (s.type === 'stats') {
    const statsHTML = s.stats.map(st =>
      `<div class="stat">
         <div class="stat-val">${st.val}</div>
         <div class="stat-lbl">${st.lbl}</div>
       </div>`
    ).join('');
    main = `
      <p class="s-intro">${s.intro}</p>
      <div class="s-stats">${statsHTML}</div>
      ${s.footer ? `<p class="s-footer">${s.footer}</p>` : ''}`;
  }

  else if (s.type === 'timeline') {
    const itemsHTML = s.items.map(it =>
      `<div class="tl-item">
         <span class="tl-year">${it.year}</span>
         ${it.year ? '<div class="tl-dash"></div>' : '<div style="width:32px"></div>'}
         <span class="tl-label">${it.label}</span>
       </div>`
    ).join('');
    main = `
      <p class="s-intro">${s.intro}</p>
      <div class="timeline">${itemsHTML}</div>
      ${s.footer ? `<p class="s-footer">${s.footer}</p>` : ''}`;
  }

  else if (s.type === 'projects') {
    const projHTML = s.items.map(it =>
      `<div class="proj-item">
         <div class="proj-dot"></div>
         <span>${it}</span>
       </div>`
    ).join('');
    main = `
      <p class="s-intro">${s.intro}</p>
      ${s.headline ? `<div class="s-headline">${s.headline}</div>` : ''}
      <div class="projects">${projHTML}</div>`;
  }

  else if (s.type === 'quote') {
    main = `
      <blockquote class="s-quote">${s.quote}</blockquote>
      <div class="s-logo">Viteos</div>`;
  }

  const infoHTML = (s.info || []).map(b =>
    `<div class="info-block">
       <div class="info-label">${b.label}</div>
       <div class="info-text">${b.text}</div>
     </div>`
  ).join('');

  return `
    <div class="slide" data-id="${s.id}">
      ${s.videoLabel ? `<div class="video-bg"></div><div class="video-hint">${s.videoLabel}</div>` : ''}
      <div class="light-thread">
        <svg viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid meet">
          <path class="lp" d="${s.svgPath}" />
        </svg>
      </div>
      <div class="s-tc">${s.tc}</div>
      <div class="s-beat">Séq. ${String(s.id).padStart(2,'0')} &nbsp;·&nbsp; ${s.beat}</div>
      <div class="s-main">${main}</div>
      <div class="s-note">${s.note}</div>
      ${infoHTML ? `<div class="slide-info">${infoHTML}</div>` : ''}
    </div>`;
}

/* ────────────────────────────────────────────────────────
   BUILD FILMSTRIP
──────────────────────────────────────────────────────── */
function buildThumbHTML(s) {
  return `
    <div class="thumb" data-id="${s.id}" onclick="goTo(${s.id - 1})">
      <div class="thumb-bg"></div>
      <div class="thumb-overlay">
        <div class="thumb-num">${String(s.id).padStart(2,'0')}</div>
        <div class="thumb-beat">${s.beat}</div>
        <div class="thumb-tc">${s.tc}</div>
      </div>
    </div>`;
}

/* ────────────────────────────────────────────────────────
   INIT DOM
──────────────────────────────────────────────────────── */
const stage = document.getElementById('stage');
const filmstrip = document.getElementById('filmstrip');

stage.innerHTML = SLIDES.map(buildSlideHTML).join('');
filmstrip.innerHTML = SLIDES.map(buildThumbHTML).join('');

const slideEls = Array.from(stage.querySelectorAll('.slide'));
const thumbEls = Array.from(filmstrip.querySelectorAll('.thumb'));

/* ────────────────────────────────────────────────────────
   STATE
──────────────────────────────────────────────────────── */
let current = 0;
let animating = false;



/* ────────────────────────────────────────────────────────
   ANIMATION
──────────────────────────────────────────────────────── */
const HAS_GSAP = typeof gsap !== 'undefined';

/* Typewriter — écrit el caractère par caractère avec curseur clignotant */
function typewriterSeq(slideEl) {
  const TARGETS = '.s-intro, .s-tagline, .stat-val, .tl-label, .proj-item > span, .s-quote, .s-logo';
  const els = [...slideEl.querySelectorAll(TARGETS)].filter(e => e.textContent.trim());

  let t = 0;
  els.forEach(el => {
    const text = el.textContent.trim();
    el.textContent = '';

    const cur = document.createElement('span');
    cur.textContent = '|';
    cur.className = 'tw-cursor tw-blink';
    el.appendChild(cur);

    // vitesse adaptée : max 1.8s par élément
    const dt = Math.min(0.045, 1.8 / text.length);

    [...text].forEach((ch, i) => {
      gsap.delayedCall(t + i * dt, () => el.insertBefore(document.createTextNode(ch), cur));
    });

    const dur = text.length * dt;
    gsap.delayedCall(t + dur + 0.05, () => {
      cur.classList.remove('tw-blink');
      gsap.to(cur, { opacity: 0, duration: 0.12, delay: 0.4, onComplete: () => cur.remove() });
    });

    t += dur + 0.18;
  });

  return t; // durée totale estimée
}

function animateIn(el) {
  if (!HAS_GSAP) { animating = false; return; }

  const tc   = el.querySelector('.s-tc');
  const beat = el.querySelector('.s-beat');
  const main = el.querySelector('.s-main');
  const note = el.querySelector('.s-note');
  const lp   = el.querySelector('.lp');

  gsap.set(el, { clearProps: 'opacity,transform' });
  gsap.set([tc, beat, note], { opacity: 0, y: 18 });
  gsap.set(main, { opacity: 0 });
  if (lp) gsap.set(lp, { strokeDashoffset: 1200 });

  const tl = gsap.timeline();

  tl.to(tc,  { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' })
    .to(beat, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' }, '-=0.15')
    .add(() => {
      // Vide les textes ET rend main visible — l'effet typewriter prend le relai
      const twDur = typewriterSeq(el);
      gsap.set(main, { opacity: 1 });
      // La note apparaît après la fin estimée du typewriter
      gsap.to(note, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out', delay: twDur });
      gsap.delayedCall(twDur + 0.5, () => { animating = false; });
    }, '+=0.1');

  if (lp) {
    tl.to(lp, { strokeDashoffset: 0, duration: 2.2, ease: 'power1.inOut' }, 0.3);
  }
}

function animateOut(el, cb) {
  if (!HAS_GSAP) {
    el.classList.remove('is-active');
    cb && cb();
    return;
  }
  gsap.to(el, {
    opacity: 0, y: -12, duration: 0.3,
    ease: 'power2.in',
    onComplete: () => {
      el.classList.remove('is-active');
      gsap.set(el, { opacity: 0, y: 0 });
      cb && cb();
    }
  });
}

/* ────────────────────────────────────────────────────────
   NAVIGATION
──────────────────────────────────────────────────────── */
function goTo(idx) {
  if (animating || idx === current) return;
  if (idx < 0 || idx >= SLIDES.length) return;
  animating = true;

  const prev = slideEls[current];
  const next = slideEls[idx];

  animateOut(prev, () => {
    current = idx;
    updateUI();
    next.classList.add('is-active');
    animateIn(next);
  });
}

function go(dir) { goTo(current + dir); }

function updateUI() {
  // counter
  document.getElementById('cur').textContent = String(current + 1).padStart(2, '0');

  // progress bar
  const pct = ((current + 1) / SLIDES.length) * 100;
  document.getElementById('progress').style.width = pct + '%';

  // thumbnails
  thumbEls.forEach((t, i) => t.classList.toggle('is-active', i === current));

  // nav buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === SLIDES.length - 1;

  // scroll thumb into view
  thumbEls[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

/* ────────────────────────────────────────────────────────
   KEYBOARD
──────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    go(-1);
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End')  goTo(SLIDES.length - 1);
});

/* ────────────────────────────────────────────────────────
   FIRST SLIDE
──────────────────────────────────────────────────────── */
slideEls[0].classList.add('is-active');
updateUI();
animateIn(slideEls[0]);
</script>
